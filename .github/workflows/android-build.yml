name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache-dependency-path: ./mobile-app/package-lock.json
          cache: 'npm' # замените на 'yarn' или 'pnpm' при необходимости
          

      - name: Install dependencies
        run: npm ci
        working-directory: ./mobile-app

      - name: Generate Android project (Expo prebuild)
        run: npx expo prebuild --platform android --non-interactive --no-install
        working-directory: ./mobile-app

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # RN 0.72+ требует JDK 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
        working-directory: mobile-app

      - name: Append build hash to app version
        run: |
          BUILD_HASH="$(git rev-parse --short HEAD)"
          node -e "const fs=require('fs'); const path='./mobile-app/package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); const base=String(pkg.version||'1.0.0').split('+')[0]; pkg.version=base+'+'+process.env.BUILD_HASH; fs.writeFileSync(path, JSON.stringify(pkg, null, 2)+'\n');"
        env:
          BUILD_HASH: ${{ github.sha }}

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease
        working-directory: mobile-app

      - name: Prepare named APK artifact
        run: cp mobile-app/android/app/build/outputs/apk/release/app-release.apk mobile-app/android/app/build/outputs/apk/release/TroubleDent.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: mobile-app/android/app/build/outputs/apk/release/TroubleDent.apk
          retention-days: 5

      - name: Read app version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: app_version
        run: |
          VERSION="$(node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('./mobile-app/package.json','utf8')); process.stdout.write(String(pkg.version));")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish APK to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.app_version.outputs.version }}
          name: Android v${{ steps.app_version.outputs.version }}
          body: |
            Автоматически опубликованный APK из ветки main.
            Версия приложения: ${{ steps.app_version.outputs.version }}.
          files: mobile-app/android/app/build/outputs/apk/release/TroubleDent.apk
          overwrite_files: true